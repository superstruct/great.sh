name: cd

on:
  push:
    branches: [release]
    paths-ignore:
      - 'infra/**'
      - 'src/**'
      - 'tests/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter great-sh build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::756605216505:role/great-sh-deploy
          aws-region: us-east-1

      - name: Deploy assets
        run: |
          aws s3 sync site/dist/assets s3://great.sh-cloudfront/assets \
            --cache-control "public,max-age=31536000,immutable"

      - name: Deploy HTML
        run: |
          aws s3 sync site/dist s3://great.sh-cloudfront \
            --exclude "assets/*" \
            --cache-control "no-cache" \
            --delete

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "::error::CLOUDFRONT_DISTRIBUTION_ID repo variable is not set — CDN not invalidated (S3 already updated)."
            exit 1
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
